spring.application.name=harekrishna-translator-backend
server.port=8080

# Default to 'local' profile if none specified
spring.profiles.active=local

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:harekrishna_translator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# LLM Configuration
llm.api.key=${LLM_API_KEY}
llm.model=${LLM_MODEL}
llm.base-url=${LLM_BASE_URL}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
