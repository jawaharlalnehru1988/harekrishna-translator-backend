spring.application.name=harekrishna-translator-backend
server.port=8080

# Default to 'local' profile if none specified
spring.profiles.active=local

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:harekrishna_translator}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# LLM Configuration
llm.api.key=${LLM_API_KEY}
llm.model=${LLM_MODEL}
llm.base-url=${LLM_BASE_URL}

# LangChain4j Configuration
langchain4j.open-ai.chat-model.api-key=${llm.api.key}
# LangChain4j appends /chat/completions automatically, so llm.base-url should only contain the root (e.g., https://api.openai.com/v1/)
langchain4j.open-ai.chat-model.base-url=${llm.base-url}
langchain4j.open-ai.chat-model.model-name=${llm.model}
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
